; === TOOLTIP / HINT ===
hint_mem_help=Passa il mouse su un controllo per vederne la descrizione qui
hint_mem_log=Log operazioni: mostra i comandi inviati a zpaqfranz e il relativo output. Tasto destro per salvare in txt
hint_compression_level=Livello di compressione: 0=Nessuna (velocissimo) fino a 5=Massima (lentissimo, miglior rapporto). Default 1
hint_blocksize=Dimensione media dei blocchi
hint_threads=Seleziona il numero di thread paralleli
hint_fragment=Seleziona la dimensione dei frammenti. Numero minore=dimensione ridotta, ma carico maggiore
hint_hash=Algoritmo hash per verificare l'integrità dei file nell'archivio. XXHASH è veloce e consigliato
hint_archive_format=Formato archivio: Normale (nessuna cifratura), AES (cifratura simmetrica), Franzen (cifratura alternativa), o entrambi
hint_multipart=Modalità multipart: suddivide l'archivio in parti numerate (es. _? per fino a 9 parti). NO = archivio singolo
hint_chunked=Modalità chunked: limita ogni chunk a una dimensione specifica (utile per supporti ottici o drive FAT32)
hint_cmb_archive_name=Percorso dell'archivio di destinazione. Gli archivi recenti sono elencati qui. Scrivi o seleziona
hint_btn_archive_name=Sfoglia o digita un nome file di archivio di destinazione (.zpaq o .zpaq.franzen)
hint_btn_ok=Avvia l'operazione di aggiunta all'archivio con le impostazioni correnti
hint_btn_cancel=Chiudi questa finestra. Se un'operazione è in esecuzione non verrà interrotta
hint_btn_abort=Termina immediatamente l'operazione in corso. L'archivio potrebbe risultare incompleto
hint_minsize=Dimensione minima del file (es. 1000, 10M, 20GB)
hint_maxsize=Dimensione massima del file
hint_datefrom=Data minima
hint_dateto=Data massima
hint_not=File da escludere (usa lo spazio come separatore)
hint_always=File da includere sempre (usa lo spazio come separatore)
hint_comment=Incorpora questo testo come commento nell'archivio.
hint_find=Frammento di percorso da cercare quando si riscrivono i percorsi interni dell'archivio.
hint_replace=La stringa che sostituisce il frammento Find nei percorsi interni dell'archivio.
hint_to=Sostituisce il prefisso del percorso memorizzato con questo valore.
hint_timestamp=Imposta il timestamp della prossima versione
hint_verbose=Mostra output dettagliato durante l'operazione.
hint_force=Forza l'aggiunta anche se i file non sono cambiati.
hint_store=Archivia i file senza compressione (equivalente al livello 0).
hint_nochecksum=Salta il calcolo del checksum per velocizzare l'archiviazione (meno sicuro).
hint_touch=Forza il touch di ogni file (converte i formati file)
hint_home=Archivia i file usando solo un percorso a livello singolo relativo alla home directory.
hint_utc=Forza l'ora UTC
hint_vss=Usa il Servizio Copia Shadow del Volume per eseguire il backup di file aperti/bloccati.
hint_longpath=Abilita il supporto per percorsi più lunghi di 255 caratteri in Windows
hint_xls=Forza la compatibilità con i vecchi formati Microsoft Office (.xls, .doc, .ppt).
hint_715=Usa il formato file zpaq 7.15 per compatibilità con strumenti precedenti.
hint_forcewindows=Forza la memorizzazione di elementi Windows
hint_space=Ignora il controllo dello spazio libero su disco prima di scrivere l'archivio.
hint_stdout=Scrive l'output dell'archivio su stdout per il piping verso un altro processo.
hint_kill=Esegui operazioni pericolose
hint_zero=Riempi con zero i file (per debug)
hint_collision=Controlla le collisioni SHA-1

